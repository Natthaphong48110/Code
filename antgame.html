<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกม AR: ก้อยไข่มดแดงพิชิตเกรด</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a202c; font-family: 'Sarabun', sans-serif; }
        
        /* ป้องกันกล้องกลับด้าน (ทำเป็นกระจกเงาเพื่อให้ควบคุมง่าย) */
        .mirror {
            transform: scaleX(-1);
        }

        #videoElement {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.8;
        }

        #gameCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; /* Canvas ซ้อนทับวิดีโอ */
        }

        /* Glassmorphism UI */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            pointer-events: none; /* ให้คลิกทะลุไปที่ Canvas ได้ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .pointer-events-auto { pointer-events: auto; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Video Background -->
    <video id="videoElement" class="mirror" autoplay playsinline></video>
    
    <!-- Game Canvas (เอาคลาส mirror ออก เพื่อให้ตัวอักษรไม่กลับด้าน) -->
    <canvas id="gameCanvas"></canvas>

    <!-- HTML UI Layer -->
    <div id="ui-layer">
        
        <!-- Screen: Start -->
        <div id="screen-start" class="glass-panel p-8 rounded-3xl text-center pointer-events-auto transition-opacity duration-500">
            <h1 class="text-5xl font-extrabold text-white mb-4 drop-shadow-lg">🐜 ก้อยไข่มดแดง</h1>
            <h2 class="text-3xl font-bold text-yellow-300 mb-8 drop-shadow-md">พิชิตเกรด (AR Edition)</h2>
            <p class="text-white mb-6 text-lg">ใช้มือของคุณผ่านกล้อง หรือใช้เมาส์คลิกลาก เพื่อเล่นเกม</p>
            <button id="btn-init" class="bg-gradient-to-r from-green-400 to-green-600 text-white font-bold py-4 px-10 rounded-full text-2xl shadow-xl hover:scale-105 transition-transform">
                เข้าสู่เกม (Start)
            </button>
        </div>

        <!-- AI Loading Warning -->
        <div id="ai-loading" class="hidden absolute top-5 left-1/2 transform -translate-x-1/2 glass-panel px-6 py-2 rounded-full text-yellow-300 font-bold text-lg animate-pulse">
            กำลังหามือของคุณ... (หรือใช้เมาส์เล่นแทนได้)
        </div>

        <!-- Instructions Overlay (Top) -->
        <div id="instruction-text" class="hidden absolute top-5 left-1/2 transform -translate-x-1/2 glass-panel px-8 py-4 rounded-2xl text-white font-bold text-2xl text-center min-w-[300px]">
            ภารกิจ
        </div>
    </div>

<script>
/**
 * Core Setup & Variables
 */
const videoElement = document.getElementById('videoElement');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiLayer = document.getElementById('ui-layer');
const screenStart = document.getElementById('screen-start');
const btnInit = document.getElementById('btn-init');
const aiLoading = document.getElementById('ai-loading');
const instructionText = document.getElementById('instruction-text');

let cw, ch;
function resize() {
    cw = window.innerWidth;
    ch = window.innerHeight;
    canvas.width = cw;
    canvas.height = ch;
}
window.addEventListener('resize', resize);
resize();

/**
 * Game State & Input System
 */
const GAME_STATES = { INIT: 0, INSTRUCT: 1, M1: 2, M2: 3, M3: 4, M4: 5, M5: 6, M6: 7, M7: 8, END: 9, FAIL: 10 };
let currentState = GAME_STATES.INIT;

// Cursor State
let cursor = { x: cw/2, y: ch/2, isPinching: false, state: 'normal' }; // normal, hover, grabbed, missed
let rawCursor = { x: cw/2, y: ch/2 }; // For smoothing
let handDetected = false;
let landmarks = null;

// Fallback System
let usingMouse = false;

// Game Objects
let items = [];
let zones = [];
let grabbedItem = null;
let actionTimer = 0;
let actionTarget = null;
let stirProgress = 0;
let lastStirPos = {x: 0, y: 0};

/**
 * Input Handling (Mouse / Touch Fallback)
 */
function getMousePos(evt) {
    const rect = canvas.getBoundingClientRect();
    let clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    let clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
    
    return {
        x: clientX - rect.left, // Canvas กลับมาเป็นปกติแล้ว ไม่ต้องกลับค่า X
        y: clientY - rect.top
    };
}

canvas.addEventListener('mousedown', (e) => { usingMouse = true; let pos = getMousePos(e); rawCursor.x = pos.x; rawCursor.y = pos.y; cursor.isPinching = true; handlePinchStart(); });
canvas.addEventListener('mousemove', (e) => { if(usingMouse) { let pos = getMousePos(e); rawCursor.x = pos.x; rawCursor.y = pos.y; } });
canvas.addEventListener('mouseup', () => { cursor.isPinching = false; handlePinchEnd(); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); usingMouse = true; let pos = getMousePos(e); rawCursor.x = pos.x; rawCursor.y = pos.y; cursor.isPinching = true; handlePinchStart(); }, {passive: false});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(usingMouse) { let pos = getMousePos(e); rawCursor.x = pos.x; rawCursor.y = pos.y; } }, {passive: false});
canvas.addEventListener('touchend', () => { cursor.isPinching = false; handlePinchEnd(); });

/**
 * MediaPipe Hands Setup
 */
let hands;
let camera;

async function initMediaPipe() {
    aiLoading.classList.remove('hidden');
    hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });
    hands.onResults(onResults);

    camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
}

// MediaPipe Callback (แยกอิสระจากการวาด)
function onResults(results) {
    handDetected = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;
    
    if (handDetected) {
        aiLoading.classList.add('hidden');
        usingMouse = false; // Override mouse if hand is found
        landmarks = results.multiHandLandmarks[0];
        
        // 1. เคอร์เซอร์ติดตามปลายนิ้วชี้ (Index Finger Tip - Landmark 8)
        const indexTip = landmarks[8];
        const thumbTip = landmarks[4];
        
        // แปลงพิกัด (สลับแกน X ด้วย 1-x เพราะวิดีโอถูก Mirror แต่ Canvas เป็นปกติ)
        let indexX = (1 - indexTip.x) * cw;
        let indexY = indexTip.y * ch;
        rawCursor.x = indexX; 
        rawCursor.y = indexY;

        // 2. คำนวณระยะห่างด้วยพีทาโกรัส
        let thumbX = (1 - thumbTip.x) * cw;
        let thumbY = thumbTip.y * ch;
        let dx = thumbX - indexX;
        let dy = thumbY - indexY;
        let dist = Math.sqrt(dx * dx + dy * dy);

        // 3. ตรวจจับการจีบ
        const pinchThreshold = cw * 0.05; // 5% ของหน้าจอ
        let newPinchState = dist < pinchThreshold;

        if (newPinchState && !cursor.isPinching) {
            cursor.isPinching = true;
            handlePinchStart();
        } else if (!newPinchState && cursor.isPinching) {
            cursor.isPinching = false;
            handlePinchEnd();
        }
    } else {
        if(currentState > GAME_STATES.INIT) aiLoading.classList.remove('hidden');
        landmarks = null;
    }
}

/**
 * Game Engine: Object Classes
 */
class GameObject {
    constructor(id, type, emoji, name, x, y, w, h, isDraggable = true) {
        this.id = id;
        this.type = type; // 'ingredient', 'tool', 'zone', 'button'
        this.emoji = emoji;
        this.name = name;
        this.x = x; this.y = y;
        this.w = w; this.h = h;
        this.isDraggable = isDraggable;
        this.isChopped = false;
        this.isPounded = false;
        this.targetZone = null;
    }

    contains(px, py) {
        return px >= this.x - this.w/2 && px <= this.x + this.w/2 &&
               py >= this.y - this.h/2 && py <= this.y + this.h/2;
    }

    draw(ctx) {
        // Draw 2.5D Glassmorphism Box
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Box
        ctx.fillStyle = this.type === 'zone' ? 'rgba(0,0,0,0.4)' : (this.type === 'button' ? 'rgba(34, 197, 94, 0.8)' : 'rgba(255, 255, 255, 0.2)');
        ctx.strokeStyle = this.type === 'zone' ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.8)';
        if(this.type === 'zone' && this.id === actionTarget?.id) ctx.strokeStyle = '#fef08a'; // Highlight

        ctx.lineWidth = 3;
        if(this.type !== 'zone') {
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 5;
        }

        ctx.beginPath();
        if(this.type === 'zone') {
            ctx.setLineDash([10, 10]);
            ctx.roundRect(-this.w/2, -this.h/2, this.w, this.h, 20);
        } else {
            ctx.roundRect(-this.w/2, -this.h/2, this.w, this.h, 15);
        }
        ctx.fill();
        ctx.stroke();
        ctx.setLineDash([]);

        // Emoji & Text Alignment & Configuration
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
        
        // ล็อคคุณสมบัติจัดกึ่งกลางและทิศทางตัวอักษรไว้ล่วงหน้าเพื่อป้องกันข้อความเอียง
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.direction = 'ltr';
        
        let nameText = this.name ? this.name.trim() : "";
        let hasBoth = this.emoji && nameText;
        
        // คำนวณแกน Y ให้สมมาตรและสมดุลสายตาพอดีทั้งบนและล่าง
        let emojiY = hasBoth ? -this.h * 0.14 : 0;
        let textY = hasBoth ? this.h * 0.26 : 0;

        if (this.emoji) {
            let emojiSize = Math.min(this.w, this.h) * 0.45;
            ctx.font = `${emojiSize}px Arial, sans-serif`;
            ctx.fillText(this.emoji, 0, emojiY);
        }
        
        if (nameText) {
            let fontSize = Math.max(12, Math.min(this.w * 0.16, 24));
            ctx.font = `bold ${fontSize}px 'Sarabun', sans-serif`;
            
            // วัดขนาดข้อความหลังจากตั้งค่า Font และ Align เรียบร้อยแล้ว เพื่อความแม่นยำสูงสุด
            let textWidth = ctx.measureText(nameText).width;
            if (textWidth > this.w * 0.9) {
                fontSize = fontSize * ((this.w * 0.9) / textWidth);
                ctx.font = `bold ${fontSize}px 'Sarabun', sans-serif`;
            }
            
            ctx.fillStyle = 'white';
            ctx.fillText(nameText, 0, textY);
        }

        // Action Progress Bar
        if (actionTarget === this && actionTimer > 0) {
            let progress = Math.min(1, actionTimer / 120); // 120 frames = ~2s
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(-this.w/2 + 10, this.h/2 + 10, this.w - 20, 10);
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(-this.w/2 + 10, this.h/2 + 10, (this.w - 20) * progress, 10);
        }

        ctx.restore();
    }
}

/**
 * Game Logic & State Transitions
 */
let missionData = {
    antNeeds: { water: 100, meat: 100, nectar: 100 },
    antReadiness: 0,
    choppedCount: 0,
    bowlIngredients: 0
};

function setupState(newState) {
    currentState = newState;
    items = []; zones = [];
    instructionText.classList.remove('hidden');

    const leftX = cw * 0.15;
    const rightX = cw * 0.85;
    const centerY = ch / 2;
    const mainX = cw / 2;
    
    switch(newState) {
        case GAME_STATES.INSTRUCT:
            instructionText.innerText = "บีบนิ้ว (Pinch) เพื่อจับปุ่มเริ่มเกม";
            items.push(new GameObject('startBtn', 'button', '🎮', 'เริ่มเกม!', mainX, centerY, 200, 120, false));
            break;
            
        case GAME_STATES.M1:
            // รีเซ็ตค่าด่าน 1 ใหม่เสมอเมื่อเริ่มหรือเริ่มใหม่
            missionData.antNeeds = { water: 100, meat: 100, nectar: 100 };
            missionData.antReadiness = 0;
            instructionText.innerText = "ภารกิจที่ 1: เลี้ยงรังมดแดง เติมน้ำ/อาหารให้รังมด";
            zones.push(new GameObject('nest', 'zone', '🌳🐜', 'รังมดแดง', mainX, centerY, 300, 300, false));
            items.push(new GameObject('water', 'ingredient', '💧', 'น้ำ', rightX, ch*0.3, 100, 100, true));
            items.push(new GameObject('meat', 'ingredient', '🥩', 'เศษเนื้อ', rightX, ch*0.5, 100, 100, true));
            items.push(new GameObject('nectar', 'ingredient', '🍯', 'น้ำหวาน', rightX, ch*0.7, 100, 100, true));
            break;

        case GAME_STATES.M2:
            instructionText.innerText = "ภารกิจที่ 2: ลากวัตถุดิบไปที่เขียง แล้วใช้มีดหั่น (ค้างไว้ 2 วิ)";
            zones.push(new GameObject('board', 'zone', '🟫', 'เขียง', mainX, centerY, 350, 250, false));
            items.push(new GameObject('knife', 'tool', '🔪', 'มีด', rightX, centerY, 120, 120, true));
            // Ingredients
            let m2Ing = [
                {id: 'shallot', e: '🧅', n: 'หอมแดง'}, {id: 'chiliR', e: '🌶️', n: 'พริกแดง'},
                {id: 'culantro', e: '🌿', n: 'ผักชีฝรั่ง'}, {id: 'spring', e: '🌱', n: 'ต้นหอม'},
                {id: 'coriander', e: '☘️', n: 'ผักชี'}, {id: 'lime', e: '🍋', n: 'มะนาว'}
            ];
            m2Ing.forEach((ing, i) => {
                items.push(new GameObject(ing.id, 'ingredient', ing.e, ing.n, leftX, ch*0.2 + (i*90), 90, 80, true));
            });
            break;

        case GAME_STATES.M3:
            instructionText.innerText = "ภารกิจที่ 3: ลากพริกแห้งลงครก แล้วใช้สากตำ";
            zones.push(new GameObject('mortar', 'zone', '🥣', 'ครก', mainX, centerY, 250, 250, false));
            items.push(new GameObject('pestle', 'tool', '🏏', 'สาก', rightX, centerY, 120, 120, true));
            items.push(new GameObject('chiliD', 'ingredient', '🌶️', 'พริกแห้ง', leftX, centerY, 100, 100, true));
            break;

        case GAME_STATES.M4:
            instructionText.innerText = "ภารกิจที่ 4: ใส่ไข่มดแดง, พริกป่น, ข้าวคั่ว, น้ำปลา, ปลาร้า, มะนาว ลงชาม";
            zones.push(new GameObject('bowl', 'zone', '🍲', 'ชามผสม', mainX, centerY, 350, 250, false));
            let m4Ing = [
                {id: 'antEgg', e: '🥚', n: 'ไข่มดแดง'}, {id: 'chiliP', e: '🌶️', n: 'พริกป่น'},
                {id: 'rice', e: '🌾', n: 'ข้าวคั่ว'}, {id: 'fishS', e: '🍶', n: 'น้ำปลา'},
                {id: 'plara', e: '🐟', n: 'น้ำปลาร้า'}, {id: 'limeC', e: '🍋', n: 'มะนาว(หั่น)'}
            ];
            m4Ing.forEach((ing, i) => {
                items.push(new GameObject(ing.id, 'ingredient', ing.e, ing.n, leftX, ch*0.2 + (i*90), 90, 80, true));
            });
            break;

        case GAME_STATES.M5:
            instructionText.innerText = "ภารกิจที่ 5: ใช้ทัพพีคนให้เข้ากัน (วน 10 รอบ)";
            zones.push(new GameObject('bowl', 'zone', '🍲', 'ชามผสม', mainX, centerY, 350, 250, false));
            items.push(new GameObject('spoon', 'tool', '🥄', 'ทัพพี', rightX, centerY, 120, 120, true));
            stirProgress = 0;
            break;

        case GAME_STATES.M6:
            instructionText.innerText = "ภารกิจที่ 6: ใส่ผักที่ซอยแล้ว (พริก, หอม, ผักชีฝรั่ง, ต้นหอม, ผักชี, สะระแหน่)";
            zones.push(new GameObject('bowl', 'zone', '🍲', 'ชามผสม', mainX, centerY, 350, 250, false));
            let m6Ing = [
                {id: 'chiliRC', e: '🌶️', n: 'พริก(ซอย)'}, {id: 'shallotC', e: '🧅', n: 'หอม(ซอย)'},
                {id: 'culantroC', e: '🌿', n: 'ผักชีฝรั่ง'}, {id: 'springC', e: '🌱', n: 'ต้นหอม'},
                {id: 'corianderC', e: '☘️', n: 'ผักชี'}, {id: 'mint', e: '🍃', n: 'สะระแหน่'}
            ];
            m6Ing.forEach((ing, i) => {
                items.push(new GameObject(ing.id, 'ingredient', ing.e, ing.n, leftX, ch*0.2 + (i*90), 90, 80, true));
            });
            missionData.bowlIngredients = 0;
            break;

        case GAME_STATES.M7:
            instructionText.innerText = "ภารกิจที่ 7: คนคลุกเคล้าขั้นตอนสุดท้าย";
            zones.push(new GameObject('bowl', 'zone', '🍲', 'ชามผสม', mainX, centerY, 350, 250, false));
            items.push(new GameObject('spoon', 'tool', '🥄', 'ทัพพี', rightX, centerY, 120, 120, true));
            stirProgress = 0;
            break;

        case GAME_STATES.END:
            instructionText.innerText = "เสร็จสิ้น!";
            items.push(new GameObject('dish', 'zone', '✨🥗✨', 'ก้อยไข่มดแดงแสนอร่อย', mainX, centerY-50, 400, 300, false));
            items.push(new GameObject('restartBtn', 'button', '🔄', 'เล่นอีกครั้ง', mainX, ch*0.8, 200, 80, false));
            break;

        case GAME_STATES.FAIL:
            instructionText.innerText = "ภารกิจล้มเหลว! มดตาย/หนีไปหมดแล้ว";
            items.push(new GameObject('failIcon', 'zone', '❌', 'รังมดร้าง', mainX, centerY-50, 400, 300, false));
            items.push(new GameObject('restartBtn', 'button', '🔄', 'เริ่มใหม่', mainX, ch*0.8, 200, 80, false));
            break;
    }
}

/**
 * Interaction Handling
 */
function handlePinchStart() {
    let hit = false;
    // Check buttons first
    if(currentState === GAME_STATES.INSTRUCT && items[0].contains(cursor.x, cursor.y)) {
        setupState(GAME_STATES.M1);
        cursor.state = 'grabbed'; return;
    }
    if((currentState === GAME_STATES.END || currentState === GAME_STATES.FAIL) && items[1].contains(cursor.x, cursor.y)) {
        setupState(GAME_STATES.M1);
        cursor.state = 'grabbed'; return;
    }

    // Check draggable items (reverse loop to grab top items)
    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        if (item.isDraggable && item.contains(cursor.x, cursor.y)) {
            grabbedItem = item;
            cursor.state = 'grabbed';
            hit = true;
            // Move item to top of array
            items.push(items.splice(i, 1)[0]);
            break;
        }
    }
    if(!hit) cursor.state = 'missed';
}

function handlePinchEnd() {
    cursor.state = 'normal';
    if (!grabbedItem) return;

    let targetZone = zones.find(z => z.contains(cursor.x, cursor.y));
    
    // Logic based on state
    if (currentState === GAME_STATES.M1 && targetZone?.id === 'nest') {
        if(grabbedItem.id === 'water') missionData.antNeeds.water = Math.min(100, missionData.antNeeds.water + 30);
        if(grabbedItem.id === 'meat') missionData.antNeeds.meat = Math.min(100, missionData.antNeeds.meat + 30);
        if(grabbedItem.id === 'nectar') missionData.antNeeds.nectar = Math.min(100, missionData.antNeeds.nectar + 30);
        
        // เพิ่มความพร้อม 10% ทุกครั้งที่หยิบอาหารป้อนสำเร็จ
        missionData.antReadiness = Math.min(100, missionData.antReadiness + 10);
        if (missionData.antReadiness >= 100) {
            setupState(GAME_STATES.M2);
        }

        // Reset item position กลับไปที่เดิมให้สวยงาม
        grabbedItem.x = cw * 0.85;
        grabbedItem.y = grabbedItem.id === 'water' ? ch*0.3 : (grabbedItem.id === 'meat' ? ch*0.5 : ch*0.7);
    } 
    else if (currentState === GAME_STATES.M2 || currentState === GAME_STATES.M3) {
        if (grabbedItem.type === 'ingredient' && targetZone) {
            // Drop on board/mortar
            grabbedItem.targetZone = targetZone;
            grabbedItem.x = targetZone.x;
            grabbedItem.y = targetZone.y;
        } else if (grabbedItem.type === 'tool') {
            // Return tool to origin
            grabbedItem.x = cw * 0.85;
            grabbedItem.y = ch / 2;
        }
    }
    else if (currentState === GAME_STATES.M4 || currentState === GAME_STATES.M6) {
        if (grabbedItem.type === 'ingredient' && targetZone?.id === 'bowl') {
            // Remove item, add to bowl progress
            items = items.filter(i => i.id !== grabbedItem.id);
            missionData.bowlIngredients++;
            if(items.length === 0) { // All ingredients added
                setupState(currentState === GAME_STATES.M4 ? GAME_STATES.M5 : GAME_STATES.M7);
            }
        }
    }
    else if (currentState === GAME_STATES.M5 || currentState === GAME_STATES.M7) {
        if (grabbedItem.type === 'tool') {
             grabbedItem.x = cw * 0.85; grabbedItem.y = ch / 2;
        }
    }

    actionTarget = null;
    actionTimer = 0;
    grabbedItem = null;
}

/**
 * Main Game Loop (Draw & Update)
 */
function drawLoop() {
    // 1. Update Cursor Smoothing
    cursor.x += (rawCursor.x - cursor.x) * 0.3;
    cursor.y += (rawCursor.y - cursor.y) * 0.3;

    // 2. Clear Canvas
    ctx.clearRect(0, 0, cw, ch);

    // 3. Game Logic Updates
    updateGameLogic();

    // 4. Render Zones & Items
    zones.forEach(z => z.draw(ctx));
    items.forEach(i => i.draw(ctx));

    // 5. Draw Specific UI Overlays on Canvas
    drawMissionUI();

    // 6. Draw AI Hands (if active)
    if (handDetected && landmarks) {
        drawHandSkeleton();
    }

    // 7. Draw Custom Cursor
    drawCursor();

    requestAnimationFrame(drawLoop);
}

function updateGameLogic() {
    // Hover state update
    if (!cursor.isPinching) {
        let hovering = items.some(i => i.isDraggable && i.contains(cursor.x, cursor.y)) ||
                       (currentState === GAME_STATES.INSTRUCT && items[0].contains(cursor.x, cursor.y)) ||
                       ((currentState === GAME_STATES.END || currentState === GAME_STATES.FAIL) && items[1].contains(cursor.x, cursor.y));
        cursor.state = hovering ? 'hover' : 'normal';
    }

    // Handle dragged item
    if (grabbedItem) {
        grabbedItem.x = cursor.x;
        grabbedItem.y = cursor.y;
    }

    // Mission 1: Ant Farm Logic
    if (currentState === GAME_STATES.M1) {
        // ค่าอาหารและน้ำลดลงเรื่อยๆ (ปรับให้ช้าลง จาก 0.15 เหลือ 0.04 ต่อเฟรม)
        missionData.antNeeds.water -= 0.04;
        missionData.antNeeds.meat -= 0.04;
        missionData.antNeeds.nectar -= 0.04;

        // ตรวจสอบว่าถ้าหลอดไหนหมด (เหลือ 0) ให้ Game Over ทันที
        if(missionData.antNeeds.water <= 0 || missionData.antNeeds.meat <= 0 || missionData.antNeeds.nectar <= 0) {
            setupState(GAME_STATES.FAIL);
        }
    }

    // Mission 2 & 3: Chopping / Pounding logic (Hold tool over item on zone)
    if ((currentState === GAME_STATES.M2 || currentState === GAME_STATES.M3) && grabbedItem?.type === 'tool') {
        let targetZone = zones[0]; // Board or Mortar
        if (targetZone.contains(cursor.x, cursor.y)) {
            // Find ingredient on this zone
            let targetIng = items.find(i => i.type === 'ingredient' && i.targetZone === targetZone && !i.isChopped);
            if (targetIng) {
                actionTarget = targetIng;
                actionTimer++;
                // Shake effect
                targetIng.x = targetZone.x + (Math.random()*10 - 5);
                
                if (actionTimer > 120) { // ~2 seconds
                    targetIng.isChopped = true;
                    targetIng.name += (currentState===GAME_STATES.M2 ? '(ซอยแล้ว)' : '(ป่นแล้ว)');
                    targetIng.targetZone = null;
                    targetIng.x = cw * 0.15; // Move back left
                    actionTimer = 0;
                    actionTarget = null;
                    
                    // Check M2 win condition
                    if(currentState === GAME_STATES.M2 && items.filter(i=>i.type==='ingredient' && i.isChopped).length === 6) {
                        setupState(GAME_STATES.M3);
                    }
                    // Check M3 win condition
                    if(currentState === GAME_STATES.M3 && targetIng.isChopped) {
                        setupState(GAME_STATES.M4);
                    }
                }
            }
        } else {
            actionTimer = 0; actionTarget = null;
        }
    }

    // Mission 5 & 7: Stirring logic
    if ((currentState === GAME_STATES.M5 || currentState === GAME_STATES.M7) && grabbedItem?.id === 'spoon') {
        let bowl = zones[0];
        if (bowl.contains(cursor.x, cursor.y)) {
            let dx = cursor.x - lastStirPos.x;
            let dy = cursor.y - lastStirPos.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            // Accumulate movement if significant but not jumping
            if (dist > 5 && dist < 100) stirProgress += dist;
            
            if (stirProgress > 3000) { // arbitrary distance for "10 circles"
                setupState(currentState === GAME_STATES.M5 ? GAME_STATES.M6 : GAME_STATES.END);
            }
        }
        lastStirPos = {x: cursor.x, y: cursor.y};
    } else {
        lastStirPos = {x: cursor.x, y: cursor.y};
    }
}

function drawMissionUI() {
    ctx.save(); // บันทึก state เพื่อป้องกันการกระทบส่วนอื่น
    ctx.textAlign = 'center'; // บังคับให้ข้อความ UI อยู่ตรงกลางเสมอ
    ctx.textBaseline = 'middle';
    ctx.direction = 'ltr';
    
    if (currentState === GAME_STATES.M1) {
        // Draw Status Bars
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(cw/2 - 150, ch*0.2, 300, 20);
        ctx.fillStyle = '#60a5fa'; // Water
        ctx.fillRect(cw/2 - 150, ch*0.2, 300 * (Math.max(0,missionData.antNeeds.water)/100), 20);
        ctx.fillStyle = 'white'; ctx.font = 'bold 16px Sarabun, sans-serif'; 
        ctx.fillText('น้ำ', cw/2, ch*0.2 + 10);

        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(cw/2 - 150, ch*0.2 + 30, 300, 20);
        ctx.fillStyle = '#f87171'; // Meat
        ctx.fillRect(cw/2 - 150, ch*0.2 + 30, 300 * (Math.max(0,missionData.antNeeds.meat)/100), 20);
        ctx.fillStyle = 'white';
        ctx.fillText('เนื้อ', cw/2, ch*0.2 + 40);

        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(cw/2 - 150, ch*0.2 + 60, 300, 20);
        ctx.fillStyle = '#fbbf24'; // Nectar
        ctx.fillRect(cw/2 - 150, ch*0.2 + 60, 300 * (Math.max(0,missionData.antNeeds.nectar)/100), 20);
        ctx.fillStyle = 'white';
        ctx.fillText('น้ำหวาน', cw/2, ch*0.2 + 70);

        // Readiness
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(cw/2 - 200, ch*0.8, 400, 30);
        ctx.fillStyle = '#4ade80'; 
        ctx.fillRect(cw/2 - 200, ch*0.8, 400 * (missionData.antReadiness/100), 30);
        ctx.fillStyle = 'white'; ctx.fillText('ความพร้อมเก็บไข่มดแดง', cw/2, ch*0.8 + 15);
    }
    
    if (currentState === GAME_STATES.M5 || currentState === GAME_STATES.M7) {
        // Stir Progress
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(cw/2 - 150, ch*0.8, 300, 30);
        ctx.fillStyle = '#a78bfa'; 
        ctx.fillRect(cw/2 - 150, ch*0.8, 300 * Math.min(1, stirProgress/3000), 30);
        ctx.fillStyle = 'white'; ctx.font = 'bold 16px Sarabun, sans-serif'; 
        ctx.fillText('กำลังคลุกเคล้า...', cw/2, ch*0.8 + 15);
    }
    
    ctx.restore(); // คืนค่า state
}

function drawHandSkeleton() {
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.fillStyle = 'rgba(0, 255, 255, 0.8)';

    // Connections
    const connections = HAND_CONNECTIONS;
    for (let i = 0; i < connections.length; i++) {
        const [a, b] = connections[i];
        ctx.beginPath();
        // สลับแกน X ตอนวาดเส้นโครงมือ
        ctx.moveTo((1 - landmarks[a].x) * cw, landmarks[a].y * ch);
        ctx.lineTo((1 - landmarks[b].x) * cw, landmarks[b].y * ch);
        ctx.stroke();
    }

    // Points
    for (let i = 0; i < landmarks.length; i++) {
        ctx.beginPath();
        // สลับแกน X ตอนวาดจุดข้อต่อ
        ctx.arc((1 - landmarks[i].x) * cw, landmarks[i].y * ch, 4, 0, 2 * Math.PI);
        ctx.fill();
    }
    ctx.restore();
}

function drawCursor() {
    ctx.save();
    ctx.beginPath();
    ctx.arc(cursor.x, cursor.y, 20, 0, Math.PI * 2);
    ctx.lineWidth = 4;

    if (cursor.state === 'normal') {
        ctx.strokeStyle = '#3b82f6'; // Blue
    } else if (cursor.state === 'hover') {
        ctx.strokeStyle = '#facc15'; // Yellow
        ctx.setLineDash([5, 5]);
    } else if (cursor.state === 'missed') {
        ctx.strokeStyle = '#ef4444'; // Red
    } else if (cursor.state === 'grabbed') {
        ctx.strokeStyle = '#22c55e'; // Green
        ctx.fillStyle = '#22c55e';
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = '20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('✔️', cursor.x, cursor.y);
    }
    
    if(cursor.state !== 'grabbed') ctx.stroke();
    ctx.restore();
}

/**
 * Initialize
 */
btnInit.addEventListener('click', () => {
    screenStart.style.opacity = '0';
    setTimeout(() => {
        screenStart.classList.add('hidden');
        initMediaPipe();
        setupState(GAME_STATES.INSTRUCT);
        // Start Game Loop
        requestAnimationFrame(drawLoop);
    }, 500);
});

</script>
