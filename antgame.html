<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกม AR: ก้อยไข่มดแดงพิชิตเกรด</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #1a202c; 
            font-family: 'Sarabun', sans-serif;
            touch-action: none;
        }
        .mirror { transform: scaleX(-1); }
        #videoElement { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.8; }
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; touch-action: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pointer-events-auto { pointer-events: auto; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <video id="videoElement" class="mirror" autoplay playsinline></video>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="screen-start" class="glass-panel p-8 rounded-3xl text-center pointer-events-auto transition-opacity duration-500">
            <h1 class="text-5xl font-extrabold text-white mb-4 drop-shadow-lg">🐜 ก้อยไข่มดแดง</h1>
            <h2 class="text-3xl font-bold text-yellow-300 mb-8 drop-shadow-md">พิชิตเกรด (AR Edition)</h2>
            <p class="text-white mb-6 text-lg">ใช้มือของคุณผ่านกล้อง หรือใช้เมาส์คลิกลาก เพื่อเล่นเกม</p>
            <button id="btn-init" class="bg-gradient-to-r from-green-400 to-green-600 text-white font-bold py-4 px-10 rounded-full text-2xl shadow-xl hover:scale-105 transition-transform">
                เข้าสู่เกม (Start)
            </button>
        </div>

        <div id="instruction-text" class="hidden absolute top-4 left-1/2 transform -translate-x-1/2 glass-panel px-8 py-4 rounded-2xl text-white font-bold text-2xl text-center min-w-[300px]">
            ภารกิจ
        </div>

        <div id="ai-loading" class="hidden absolute top-28 left-1/2 transform -translate-x-1/2 glass-panel px-6 py-2 rounded-full text-yellow-300 font-bold text-lg animate-pulse">
            กำลังหามือของคุณ... (หรือใช้เมาส์เล่นแทนได้)
        </div>

        <div id="edu-panel" class="hidden absolute bottom-5 right-5 max-w-md glass-panel p-5 rounded-2xl text-white pointer-events-auto transition-all duration-300 shadow-2xl border border-white/20 z-30">
            <button id="edu-close-btn" class="absolute top-3 right-3 text-white/75 hover:text-white bg-white/10 hover:bg-white/25 w-8 h-8 rounded-full flex items-center justify-center transition-all text-sm font-bold shadow-sm">✕</button>
            <h3 class="font-bold text-yellow-300 text-lg mb-2 flex items-center gap-2 pr-8"><span>💡</span> เกร็ดความรู้คู่ครัว</h3>
            <p id="edu-text" class="text-sm leading-relaxed text-gray-100"></p>
        </div>

        <button id="edu-open-btn" class="hidden absolute bottom-5 right-5 glass-panel p-4 rounded-full text-white pointer-events-auto hover:scale-110 active:scale-95 transition-all shadow-2xl border border-white/20 z-30 flex items-center justify-center w-14 h-14 text-2xl">💡</button>
    </div>

<script>
const videoElement = document.getElementById('videoElement');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiLayer = document.getElementById('ui-layer');
const screenStart = document.getElementById('screen-start');
const btnInit = document.getElementById('btn-init');
const aiLoading = document.getElementById('ai-loading');
const instructionText = document.getElementById('instruction-text');
const eduPanel = document.getElementById('edu-panel');
const eduText = document.getElementById('edu-text');
const eduCloseBtn = document.getElementById('edu-close-btn');
const eduOpenBtn = document.getElementById('edu-open-btn');

const isIOSDevice = /iPad|iPhone|iPod/.test(navigator.platform) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) || /iPad|iPhone|iPod/.test(navigator.userAgent);
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent) || isIOSDevice;
const isAndroid = /Android/i.test(navigator.userAgent);
const isMobileDevice = isIOSDevice || isAndroid || (window.innerWidth < 1024);

let cw = window.innerWidth;
let ch = window.innerHeight;

function resize() {
    const dpr = window.devicePixelRatio || 1;
    cw = window.innerWidth;
    ch = window.innerHeight;
    canvas.width = cw * dpr;
    canvas.height = ch * dpr;
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    ctx.resetTransform();
    ctx.scale(dpr, dpr);
    updateAllObjectsScale();
}
window.addEventListener('resize', resize);

const GAME_STATES = { INIT: 0, INSTRUCT: 1, M1: 2, M2: 3, M3: 4, M4: 5, M5: 6, M6: 7, M7: 8, END: 9, FAIL: 10 };
let currentState = GAME_STATES.INIT;
let score = 0;
let scorePops = [];
let cursor = { x: cw/2, y: ch/2, isPinching: false, state: 'normal' };
let rawCursor = { x: cw/2, y: ch/2 };
let handDetected = false;
let landmarks = null;
let usingMouse = false;
let items = [];
let zones = [];
let grabbedItem = null;
let actionTimer = 0;
let actionTarget = null;
let stirProgress = 0;
let lastStirPos = {x: 0, y: 0};

let missionData = {
    startTime: 0,
    antNeeds: { water: 100, meat: 100, nectar: 100 },
    antReadiness: 0,
    bowlContents: [], 
    poundCount: 0,
    lastPestleY: 0,
    poundDirection: 0 
};

const eduTexts = {
    [GAME_STATES.INSTRUCT]: "จีบนิ้ว (นิ้วโป้งแตะปลายนิ้วชี้) บนปุ่มเพื่อเริ่มเกมได้เลย! หรือใช้เมาส์คลิกลาก",
    [GAME_STATES.M1]: "🌳 การเลี้ยงมดแดงใช้เวลาประมาณ 1-2 เดือนในการรอให้มดสร้างรังและวางไข่ สิ่งสำคัญคือต้องให้น้ำสะอาดตลอดเวลา (ใช้ขวดเจาะรูแขวนไว้) และให้อาหารโปรตีน เช่น เศษปลา สลับกับน้ำหวานเพื่อเป็นพลังงานให้มดงาน!",
    [GAME_STATES.M2]: "🧅 หอมแดงและต้นหอมผักชีฝรั่งช่วยขับลม แก้หวัด คัดจมูก ส่วนมะนาวให้วิตามินซีสดดับกลิ่นคาว",
    [GAME_STATES.M3]: "🌶️ การตำพริกแห้งในครกหิน เซลล์ของพริกจะคายน้ำมันหอมระเหยออกมามากกว่าการปั่นด้วยเครื่อง",
    [GAME_STATES.M4]: "🥚 ไข่มดแดงจัดเป็นโปรตีนชั้นสูง การผสมน้ำปลาร้าและข้าวคั่วจะช่วยชูรสนัวและซับน้ำก้อยให้ข้นขึ้น",
    [GAME_STATES.M5]: "🥄 การคนก้อยต้องใช้ความเบามือ ทะนุถนอมไม่ให้ไข่มดแดงแตก เพื่อคงเนื้อสัมผัสเต่งตึงเวลาเคี้ยว",
    [GAME_STATES.M6]: "🍃 โรยผักชี ต้นหอม หอมซอย และสะระแหน่ในขั้นตอนสุดท้าย ป้องกันไม่ให้ผักเฉาจากกรดมะนาว",
    [GAME_STATES.M7]: "🥗 คลุกเคล้าครั้งสุดท้ายให้เข้ากัน พร้อมเสิร์ฟทันทีเพื่อให้ผักและไข่ยังมีสีสันสดใส",
    [GAME_STATES.END]: "🎉 สุดยอด! ก้อยไข่มดแดงจานนี้เต็มเปี่ยมด้วยโปรตีนจากธรรมชาติและสรรพคุณสมุนไพร",
    [GAME_STATES.FAIL]: "❌ รังมดเสี่ยงขาดสารอาหารจนหนีไปหมด! การเลี้ยงต้องหมั่นเติมน้ำและอาหารสม่ำเสมอ"
};

eduCloseBtn.addEventListener('click', (e) => { e.stopPropagation(); eduPanel.classList.add('hidden'); eduOpenBtn.classList.remove('hidden'); });
eduOpenBtn.addEventListener('click', (e) => { e.stopPropagation(); eduPanel.classList.remove('hidden'); eduOpenBtn.classList.add('hidden'); });

function addScore(amount, x, y) {
    score += amount;
    scorePops.push({ text: `+${amount}`, x: x || cw / 2, y: y || ch / 2, alpha: 1, life: 60 });
}

function getMousePos(evt) {
    const rect = canvas.getBoundingClientRect();
    let clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    let clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

canvas.addEventListener('mousedown', (e) => { usingMouse = true; let pos = getMousePos(e); rawCursor.x = pos.x; rawCursor.y = pos.y; cursor.isPinching = true; handlePinchStart(); });
canvas.addEventListener('mousemove', (e) => { if(usingMouse) { let pos = getMousePos(e); rawCursor.x = pos.x; rawCursor.y = pos.y; } });
canvas.addEventListener('mouseup', () => { cursor.isPinching = false; handlePinchEnd(); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); usingMouse = true; let pos = getMousePos(e); rawCursor.x = pos.x; rawCursor.y = pos.y; cursor.isPinching = true; handlePinchStart(); }, {passive: false});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(usingMouse) { let pos = getMousePos(e); rawCursor.x = pos.x; rawCursor.y = pos.y; } }, {passive: false});
canvas.addEventListener('touchend', () => { cursor.isPinching = false; handlePinchEnd(); });

let hands;
let camera;

async function initMediaPipe() {
    aiLoading.classList.remove('hidden');
    hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);
    camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 1280, height: 720 });
    camera.start();
}

function onResults(results) {
    handDetected = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;
    if (handDetected) {
        aiLoading.classList.add('hidden');
        usingMouse = false;
        landmarks = results.multiHandLandmarks[0];
        let indexX = (1 - landmarks[8].x) * cw; let indexY = landmarks[8].y * ch;
        let thumbX = (1 - landmarks[4].x) * cw; let thumbY = landmarks[4].y * ch;
        rawCursor.x = indexX; rawCursor.y = indexY;
        let dist = Math.sqrt((thumbX-indexX)**2 + (thumbY-indexY)**2);
        let newPinchState = dist < Math.min(cw, ch) * 0.08;
        if (newPinchState && !cursor.isPinching) { cursor.isPinching = true; handlePinchStart(); } 
        else if (!newPinchState && cursor.isPinching) { cursor.isPinching = false; handlePinchEnd(); }
    } else {
        if(currentState > GAME_STATES.INIT) aiLoading.classList.remove('hidden');
        landmarks = null;
    }
}

function resetIngredientPos(item) {
    let xOffset = cw * 0.15;
    let list = [];
    if(currentState === GAME_STATES.M2) list = ['shallot', 'chiliR', 'culantro', 'spring', 'coriander', 'lime'];
    if(currentState === GAME_STATES.M3) list = ['chiliD'];
    if(currentState === GAME_STATES.M4) list = ['antEgg', 'chiliP', 'rice', 'fishS', 'plara', 'limeC'];
    if(currentState === GAME_STATES.M6) list = ['chiliRC', 'shallotC', 'culantroC', 'springC', 'corianderC', 'mint'];
    
    let idx = list.indexOf(item.id);
    if(idx !== -1) {
        item.x = xOffset; item.y = ch * 0.2 + (idx * 90);
        item.relX = item.x/cw; item.relY = item.y/ch;
        item.targetZone = null;
    } else if(item.type === 'tool') {
        item.x = cw * 0.85; item.y = ch / 2;
        item.relX = item.x/cw; item.relY = item.y/ch;
    }
}

class GameObject {
    constructor(id, type, emoji, name, x, y, w, h, isDraggable = true) {
        this.id = id; this.type = type; this.emoji = emoji; this.name = name;
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.isDraggable = isDraggable; this.isChopped = false; this.targetZone = null;
        this.relX = x / cw; this.relY = y / ch;
    }
    updateScale() { if (grabbedItem !== this) { this.x = this.relX * cw; this.y = this.relY * ch; } }
    contains(px, py) {
        const p = isMobileDevice ? 30 : 10;
        return px >= this.x - this.w/2 - p && px <= this.x + this.w/2 + p && py >= this.y - this.h/2 - p && py <= this.y + this.h/2 + p;
    }

    drawRealisticGraphics(ctx, type) {
        let sc = Math.min(this.w, this.h) / 100;
        ctx.scale(sc, sc);
        
        switch(type) {
            case 'knife':
                ctx.fillStyle = '#27272a'; ctx.beginPath(); ctx.roundRect(-45, -8, 40, 16, 4); ctx.fill();
                ctx.fillStyle = '#e2e8f0'; ctx.beginPath(); ctx.arc(-35, 0, 3, 0, Math.PI*2); ctx.arc(-15, 0, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#94a3b8'; ctx.beginPath(); ctx.moveTo(-5, -12); ctx.lineTo(50, -8); ctx.quadraticCurveTo(60, 20, 40, 20); ctx.lineTo(-5, 20); ctx.fill();
                ctx.fillStyle = '#f8fafc'; ctx.beginPath(); ctx.moveTo(-5, 16); ctx.lineTo(38, 16); ctx.lineTo(40, 20); ctx.lineTo(-5, 20); ctx.fill(); 
                break;
            case 'culantro': 
                ctx.fillStyle = '#15803d'; ctx.strokeStyle = '#14532d'; ctx.lineWidth = 1;
                for(let i=0; i<3; i++) {
                    ctx.save(); ctx.rotate(i*0.3 - 0.3);
                    ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(-10, 0); ctx.lineTo(-5, -20); ctx.lineTo(0, -40); ctx.lineTo(5, -20); ctx.lineTo(10, 0); ctx.fill(); ctx.stroke();
                    ctx.restore();
                }
                break;
            case 'spring': 
                ctx.fillStyle = '#fef08a'; ctx.beginPath(); ctx.roundRect(-5, 10, 10, 15, 2); ctx.fill(); 
                ctx.fillStyle = '#4ade80'; ctx.beginPath(); ctx.roundRect(-4, -30, 8, 40, 2); ctx.fill(); 
                ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.roundRect(-8, -25, 4, 35, 2); ctx.roundRect(4, -35, 4, 45, 2); ctx.fill();
                break;
            case 'lime': 
                let lGrad = ctx.createRadialGradient(-10, -10, 5, 0, 0, 25);
                lGrad.addColorStop(0, '#84cc16'); lGrad.addColorStop(1, '#4d7c0f');
                ctx.fillStyle = lGrad; ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#3f6212'; ctx.beginPath(); ctx.arc(20, 0, 3, 0, Math.PI*2); ctx.fill(); 
                break;
            case 'shallot':
                ctx.fillStyle = '#c026d3'; ctx.beginPath(); ctx.arc(0, 5, 18, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#e9d5ff'; ctx.beginPath(); ctx.moveTo(-6, -8); ctx.lineTo(0, -25); ctx.lineTo(6, -8); ctx.fill();
                break;
            case 'chiliR': // พริกแดงสมจริง
                ctx.fillStyle = '#16a34a'; ctx.beginPath(); ctx.moveTo(-3, -35); ctx.lineTo(3, -35); ctx.lineTo(2, -25); ctx.lineTo(-2, -25); ctx.fill(); ctx.beginPath(); ctx.arc(0, -25, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#dc2626'; ctx.beginPath(); ctx.moveTo(-6, -24); ctx.bezierCurveTo(-15, 0, -25, 20, -5, 35); ctx.bezierCurveTo(5, 20, 5, 0, 6, -24); ctx.fill();
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-2, -20); ctx.bezierCurveTo(-8, 0, -15, 15, -3, 30); ctx.stroke();
                break;
            case 'coriander': // ผักชีสมจริง
                ctx.strokeStyle = '#15803d'; ctx.lineWidth = 1.5; ctx.fillStyle = '#22c55e';
                for(let i=0; i<3; i++) {
                    ctx.save(); ctx.rotate((i-1)*0.5);
                    ctx.beginPath(); ctx.moveTo(0, 20); ctx.quadraticCurveTo(5, 0, 0, -20); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, -22, 5, 0, Math.PI*2); ctx.arc(-5, -18, 4, 0, Math.PI*2); ctx.arc(5, -18, 4, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(-7, -8, 4, 0, Math.PI*2); ctx.arc(-11, -5, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(7, -8, 4, 0, Math.PI*2); ctx.arc(11, -5, 3, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }
                break;
            case 'chiliD': 
                ctx.fillStyle = '#7f1d1d'; ctx.strokeStyle = '#450a0a'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(-20, 10); ctx.quadraticCurveTo(0, -10, 25, 0); ctx.quadraticCurveTo(5, 10, -20, 10); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-20, 10); ctx.quadraticCurveTo(-15, 5, -5, -5); ctx.stroke(); 
                ctx.fillStyle = '#d97706'; ctx.beginPath(); ctx.roundRect(-28, 8, 10, 4, 2); ctx.fill(); 
                break;
            case 'spoon': 
                ctx.fillStyle = '#1f2937'; ctx.beginPath(); ctx.roundRect(-40, -5, 40, 10, 5); ctx.fill(); 
                let sGrad = ctx.createLinearGradient(0, -15, 0, 15); sGrad.addColorStop(0, '#e2e8f0'); sGrad.addColorStop(1, '#94a3b8');
                ctx.fillStyle = sGrad; ctx.beginPath(); ctx.ellipse(25, 0, 25, 18, 0, 0, Math.PI*2); ctx.fill(); 
                ctx.fillStyle = '#64748b'; ctx.beginPath(); ctx.ellipse(25, 0, 20, 13, 0, 0, Math.PI*2); ctx.fill(); 
                break;
            case 'pestle':
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 4;
                let pestleGrad = ctx.createLinearGradient(-40, 0, 40, 0);
                pestleGrad.addColorStop(0, '#78350f'); pestleGrad.addColorStop(0.35, '#b45309'); pestleGrad.addColorStop(0.75, '#d97706'); pestleGrad.addColorStop(1, '#78350f');
                ctx.fillStyle = pestleGrad; ctx.beginPath();
                ctx.moveTo(-15, -60); ctx.quadraticCurveTo(0, -75, 15, -60); ctx.lineTo(25, 60); ctx.quadraticCurveTo(0, 80, -25, 60); ctx.closePath(); ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = 'rgba(69, 26, 3, 0.35)'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(-15, -55); ctx.quadraticCurveTo(-6, 0, -18, 55); ctx.moveTo(10, -50); ctx.quadraticCurveTo(10, 0, 22, 55); ctx.stroke();
                ctx.fillStyle = '#451a03'; ctx.fillRect(-17, -15, 34, 8);
                ctx.restore();
                break;
            case 'mint': 
                ctx.fillStyle = '#16a34a'; ctx.strokeStyle = '#14532d'; ctx.lineWidth = 1;
                for(let i=0; i<4; i++) {
                    ctx.save(); ctx.rotate(i*Math.PI/2 + 0.5);
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(15, -15, 0, -30); ctx.quadraticCurveTo(-15, -15, 0, 0); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-28); ctx.stroke();
                    ctx.restore();
                }
                break;
            case 'bowl': // ชามผสมและของที่อยู่ในชาม
                let bGrad = ctx.createLinearGradient(0, -40, 0, 40); bGrad.addColorStop(0, '#e2e8f0'); bGrad.addColorStop(1, '#64748b');
                ctx.fillStyle = bGrad; ctx.beginPath(); ctx.ellipse(0, 0, 140, 90, 0, 0, Math.PI*2); ctx.fill(); 
                let bInGrad = ctx.createRadialGradient(0, 10, 10, 0, 0, 130); bInGrad.addColorStop(0, '#94a3b8'); bInGrad.addColorStop(1, '#334155');
                ctx.fillStyle = bInGrad; ctx.beginPath(); ctx.ellipse(0, 0, 130, 80, 0, 0, Math.PI*2); ctx.fill(); 
                ctx.strokeStyle = '#f8fafc'; ctx.lineWidth = 3; ctx.beginPath(); ctx.ellipse(0, 0, 130, 80, 0, 0, Math.PI*2); ctx.stroke(); 

                ctx.scale(0.8, 0.8); 
                
                // 1. วาดไข่มดแดงเป็นเบสชั้นล่างสุด (ถ้ามี)
                if (missionData.bowlContents.includes('antEgg')) {
                    ctx.fillStyle = '#b45309'; // สีน้ำก้อยรองพื้นนิดๆ

    }

    draw(ctx) {

            ctx.fillStyle = '#0a1407'; ctx.beginPath(); ctx.arc(nestX + 12, nestY + 15, 9, 0, Math.PI * 2); ctx.fill(); 

            let time = Date.now() * 0.0025; ctx.fillStyle = '#ca3a1b';
            let antPaths = [{ id: 1, cx: 0, cy: 60, rx: 0, ry: 75, angle: -Math.PI/2, phase: 0 }, { id: 2, cx: 0, cy: 75, rx: 0, ry: 60, angle: Math.PI/2, phase: Math.PI }, { id: 3, cx: -60, cy: 10, rx: 30, ry: 35, phase: 1 }, { id: 4, cx: -55, cy: 15, rx: 35, ry: 40, phase: 2.5 }, { id: 5, cx: 45, cy: -20, rx: 35, ry: 10, phase: 3.2 }, { id: 6, cx: -40, cy: -25, rx: 30, ry: 10, phase: 0.8 }];

                let ax = ant.cx; let ay = ant.cy; let finalAngle = 0;
                if (ant.id <= 2) { ay += Math.sin(time + ant.phase) * ant.ry; finalAngle = Math.cos(time + ant.phase) > 0 ? -Math.PI/2 : Math.PI/2; } 
                else if (ant.id === 3 || ant.id === 4) { let th = time + ant.phase; ax += Math.cos(th)*ant.rx; ay += Math.sin(th)*ant.ry; finalAngle = th + Math.PI/2; }

                ctx.save(); ctx.translate(ax, ay); ctx.rotate(finalAngle); ctx.fillStyle = '#ca3a1b';
                ctx.beginPath(); ctx.ellipse(-5, 0, 4.5, 3, 0, 0, Math.PI*2); ctx.ellipse(0, 0, 2.5, 2, 0, 0, Math.PI*2); ctx.arc(4, 0, 2.2, 0, Math.PI*2); ctx.fill();

        }

        if (this.id === 'board') {

            ctx.fillStyle = '#d7a15c'; ctx.beginPath(); ctx.arc(0, 0, r - 8, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#a67232'; ctx.lineWidth = 1.5; for (let rr = r - 20; rr > 15; rr -= 20) { ctx.beginPath(); ctx.arc(0, 0, rr, 0, Math.PI*2); ctx.stroke(); }
            ctx.strokeStyle = '#b8813f'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(r*0.6, r*0.25); ctx.moveTo(0, 0); ctx.lineTo(-r*0.5, -r*0.45); ctx.stroke();

            ctx.strokeStyle = '#f8fafc'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(-this.w/2+15, -this.h/2+15); ctx.lineTo(this.w/2-15, -this.h/2+15); ctx.stroke();

        if (this.id === 'mortar') {

            ctx.fillStyle = '#1f2937'; for (let j=0; j<40; j++) { let rx = Math.sin(j*17)*0.9*r; let ry = Math.cos(j*23)*0.9*r; if(rx*rx+ry*ry<r*r){ ctx.beginPath(); ctx.arc(rx,ry,1.5+(j%3),0,Math.PI*2); ctx.fill(); } }

            let bRad = r*0.75; let bGrad = ctx.createRadialGradient(-5, -5, 5, 0, 0, bRad); bGrad.addColorStop(0, '#1f2937'); bGrad.addColorStop(0.7, '#111827'); bGrad.addColorStop(1, '#374151');
            ctx.fillStyle = bGrad; ctx.beginPath(); ctx.arc(0, 0, bRad, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 3.5; ctx.beginPath(); ctx.arc(0, 0, bRad, 0, Math.PI*2); ctx.stroke();
            
            if (currentState === GAME_STATES.M3) { ctx.fillStyle = '#fef08a'; ctx.font = "bold 20px 'Sarabun'"; ctx.textAlign = 'center'; ctx.fillText(`ตำ: ${missionData.poundCount}/10`, 0, -r - 20); }
            ctx.restore(); return;
        }

        ctx.fillStyle = this.type === 'zone' ? 'rgba(0,0,0,0.4)' : (this.type === 'button' ? 'rgba(34, 197, 94, 0.8)' : 'rgba(255, 255, 255, 0.2)');
        ctx.strokeStyle = this.type === 'zone' ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.8)';
        if(this.type === 'zone' && this.id === actionTarget?.id) ctx.strokeStyle = '#fef08a';

        ctx.fill(); ctx.stroke(); ctx.setLineDash([]);
        ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.direction = 'ltr';
        
        let customTypes = ['knife', 'culantro', 'spring', 'lime', 'chiliD', 'spoon', 'pestle', 'antEgg', 'chiliP', 'rice', 'fishS', 'plara', 'limeC', 'chiliRC', 'shallotC', 'culantroC', 'springC', 'corianderC', 'mint', 'bowl', 'dish', 'shallot', 'chiliR', 'coriander'];

        else if (isSafari && hasBoth) { emojiY += this.h * 0.02; textY += this.h * 0.02; }

        if (isCustom) {
            ctx.save(); ctx.translate(0, emojiY);
            let drawType = this.id;
            if(this.isChopped) {
                if(this.id === 'chiliR') drawType = 'chiliRChopped';
                else if(this.id === 'shallot') drawType = 'shallotChopped';
                else if(this.id === 'lime') drawType = 'limeC';
                else drawType = 'choppedMisc';
            }
            if(this.id === 'bowl') { ctx.translate(0, 20); this.drawRealisticGraphics(ctx, 'bowl'); }

            else this.drawRealisticGraphics(ctx, drawType);
            ctx.restore();
        } else if (this.emoji) {
            let emojiSize = Math.min(this.w, this.h) * 0.45; ctx.font = `${emojiSize}px Arial, sans-serif`; ctx.fillText(this.emoji, 0, emojiY);
        }
        
        if (nameText && this.id !== 'pestle') {

        if (actionTarget === this && actionTimer > 0) {

            ctx.fillStyle = '#4ade80'; ctx.fillRect(-this.w/2 + 10, this.h/2 + 10, (this.w - 20) * progress, 10);
        }

        ctx.restore();
    }
}

function updateAllObjectsScale() { zones.forEach(z => z.updateScale()); items.forEach(i => i.updateScale()); }

function setupState(newState) {
    currentState = newState;
    items = []; zones = [];
    instructionText.classList.remove('hidden');

    const leftX = cw * 0.15; const rightX = cw * 0.85; const centerY = ch / 2; const mainX = cw / 2;

    if (eduTexts[newState]) { eduPanel.classList.remove('hidden'); eduOpenBtn.classList.add('hidden'); eduText.innerText = eduTexts[newState]; } 
    else { eduPanel.classList.add('hidden'); eduOpenBtn.classList.add('hidden'); }
    
    switch(newState) {
        case GAME_STATES.INSTRUCT:
            instructionText.innerText = "บีบนิ้ว (Pinch) เพื่อจับปุ่มเริ่มเกม";
            items.push(new GameObject('startBtn', 'button', '🎮', 'เริ่มเกม!', mainX, centerY, 200, 120, true));
            break;
            
        case GAME_STATES.M1:
            missionData.startTime = Date.now();
            missionData.antNeeds = { water: 100, meat: 100, nectar: 100 };
            missionData.antReadiness = 0; missionData.bowlContents = [];
            instructionText.innerText = "ภารกิจที่ 1: เลี้ยงรังมดแดง เติมน้ำ/อาหารให้รังมด";
            zones.push(new GameObject('nest', 'zone', '', '', mainX, centerY, 300, 300, false));
            items.push(new GameObject('water', 'ingredient', '💧', 'น้ำ', rightX, ch*0.3, 100, 100, true));
            items.push(new GameObject('meat', 'ingredient', '🥩', 'เศษเนื้อ', rightX, ch*0.5, 100, 100, true));
            items.push(new GameObject('nectar', 'ingredient', '🍯', 'น้ำหวาน', rightX, ch*0.7, 100, 100, true));
            break;

        case GAME_STATES.M2:
            instructionText.innerText = "ภารกิจที่ 2: ลากผักไปซอยบนเขียงไม้ แล้วลากมาพักที่ถาดสแตนเลสให้ครบ";
            zones.push(new GameObject('board', 'zone', '', '', mainX, centerY - 65, 230, 230, false));
            zones.push(new GameObject('tray', 'zone', '', '', mainX, centerY + 140, 420, 150, false));
            items.push(new GameObject('knife', 'tool', '', 'มีด', rightX, centerY, 120, 120, true));
            
            let m2Ing = [{id: 'shallot', e: '', n: 'หอมแดง'}, {id: 'chiliR', e: '', n: 'พริกแดง'}, {id: 'culantro', e: '', n: 'ผักชีฝรั่ง'}, {id: 'spring', e: '', n: 'ต้นหอม'}, {id: 'coriander', e: '', n: 'ผักชี'}, {id: 'lime', e: '', n: 'มะนาว'}];
            m2Ing.forEach((ing, i) => { items.push(new GameObject(ing.id, 'ingredient', ing.e, ing.n, leftX, ch*0.2 + (i*90), 90, 80, true)); });
            break;

        case GAME_STATES.M3:
            instructionText.innerText = "ภารกิจที่ 3: จับสากมาโขลก (ขยับขึ้น-ลง) ที่ครก 10 ครั้ง";
            missionData.poundCount = 0; missionData.poundDirection = 1;
            zones.push(new GameObject('mortar', 'zone', '', '', mainX, centerY, 250, 250, false));
            items.push(new GameObject('pestle', 'tool', '', '', rightX, centerY, 80, 180, true)); 
            items.push(new GameObject('chiliD', 'ingredient', '', 'พริกแห้ง', leftX, centerY, 100, 100, true));
            break;

        case GAME_STATES.M4:
            instructionText.innerText = "ภารกิจที่ 4: ใส่ไข่มดแดง, พริกป่น, ข้าวคั่ว, น้ำปลา, ปลาร้า, มะนาว ลงชาม";
            zones.push(new GameObject('bowl', 'zone', '', '', mainX, centerY, 350, 250, false));
            let m4Ing = [{id: 'antEgg', e: '', n: 'ไข่มดแดง'}, {id: 'chiliP', e: '', n: 'พริกป่น'}, {id: 'rice', e: '', n: 'ข้าวคั่ว'}, {id: 'fishS', e: '', n: 'น้ำปลา'}, {id: 'plara', e: '', n: 'น้ำปลาร้า'}, {id: 'limeC', e: '', n: 'มะนาว(หั่น)'}];
            m4Ing.forEach((ing, i) => { items.push(new GameObject(ing.id, 'ingredient', ing.e, ing.n, leftX, ch*0.2 + (i*90), 90, 80, true)); });
            break;

        case GAME_STATES.M5:
            instructionText.innerText = "ภารกิจที่ 5: ใช้ทัพพีคนให้เข้ากัน (วน 10 รอบ)";
            zones.push(new GameObject('bowl', 'zone', '', '', mainX, centerY, 350, 250, false));
            items.push(new GameObject('spoon', 'tool', '', 'ทัพพี', rightX, centerY, 120, 120, true));
            stirProgress = 0;
            break;

        case GAME_STATES.M6:
            instructionText.innerText = "ภารกิจที่ 6: ใส่ผักที่ซอยแล้ว ลงชามผสม";
            zones.push(new GameObject('bowl', 'zone', '', '', mainX, centerY, 350, 250, false));
            let m6Ing = [{id: 'chiliRC', e: '', n: 'พริกซอย'}, {id: 'shallotC', e: '', n: 'หอมซอย'}, {id: 'culantroC', e: '', n: 'ผักชีฝรั่ง'}, {id: 'springC', e: '', n: 'ต้นหอม'}, {id: 'corianderC', e: '', n: 'ผักชี'}, {id: 'mint', e: '', n: 'สะระแหน่'}];
            m6Ing.forEach((ing, i) => { items.push(new GameObject(ing.id, 'ingredient', ing.e, ing.n, leftX, ch*0.2 + (i*90), 90, 80, true)); });
            missionData.bowlIngredients = 0;
            break;

        case GAME_STATES.M7:
            instructionText.innerText = "ภารกิจที่ 7: คนคลุกเคล้าขั้นตอนสุดท้าย";
            zones.push(new GameObject('bowl', 'zone', '', '', mainX, centerY, 350, 250, false));
            items.push(new GameObject('spoon', 'tool', '', 'ทัพพี', rightX, centerY, 120, 120, true));
            stirProgress = 0;
            break;

        case GAME_STATES.END:
            instructionText.innerText = "เสร็จสิ้นภารกิจ!";
            let timeTaken = Math.floor((Date.now() - missionData.startTime) / 1000);
            let m = Math.floor(timeTaken / 60); let s = timeTaken % 60;
            let finalGrade = 'A+ 🌟'; if (score < 600) finalGrade = 'C 👌'; else if (score < 800) finalGrade = 'B 😊'; else if (score < 1100) finalGrade = 'A 👍';
            
            zones.push(new GameObject('dish', 'zone', '', '', mainX, centerY-60, 450, 320, false));
            
            let summaryBox = document.createElement('div');
            summaryBox.id = 'summaryBox';
            summaryBox.className = 'absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 mt-32 glass-panel p-6 rounded-2xl text-white font-bold text-center z-40 w-[350px]';
            summaryBox.innerHTML = `
                <h3 class="text-2xl text-yellow-300 mb-2">📊 สรุปผลการประเมิน</h3>
                <p class="text-lg">⏱️ เวลาที่ใช้: ${m} นาที ${s} วินาที</p>
                <p class="text-xl my-2">🏆 คะแนนรวม: <span class="text-green-400">${score}</span></p>
                <p class="text-3xl text-pink-400 mt-2">เกรด: ${finalGrade}</p>
            `;
            uiLayer.appendChild(summaryBox);

            items.push(new GameObject('restartBtn', 'button', '🔄', 'เล่นอีกครั้ง', mainX, ch*0.9, 200, 80, true));
            break;

        case GAME_STATES.FAIL:
            instructionText.innerText = "ภารกิจล้มเหลว! มดตาย/หนีไปหมดแล้ว";
            zones.push(new GameObject('failIcon', 'zone', '❌', 'รังมดร้าง', mainX, centerY-50, 400, 300, false));
            items.push(new GameObject('restartBtn', 'button', '🔄', 'เริ่มใหม่', mainX, ch*0.8, 200, 80, true));
            break;
    }
    resize();
}

function handlePinchStart() {
    let hit = false;
    let clickedStartBtn = items.find(item => item.id === 'startBtn');
    let clickedRestartBtn = items.find(item => item.id === 'restartBtn');

    if (currentState === GAME_STATES.INSTRUCT && clickedStartBtn && clickedStartBtn.contains(cursor.x, cursor.y)) {
        setupState(GAME_STATES.M1); addScore(100, cursor.x, cursor.y); cursor.state = 'grabbed'; return;
    }
    if ((currentState === GAME_STATES.END || currentState === GAME_STATES.FAIL) && clickedRestartBtn && clickedRestartBtn.contains(cursor.x, cursor.y)) {
        let sb = document.getElementById('summaryBox'); if(sb) sb.remove();
        score = 0; setupState(GAME_STATES.M1); cursor.state = 'grabbed'; return;
    }

    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        if (item.isDraggable && item.contains(cursor.x, cursor.y)) {
            grabbedItem = item; cursor.state = 'grabbed'; hit = true;
            items.push(items.splice(i, 1)[0]); break;
        }
    }
    if(!hit) cursor.state = 'missed';
}

function handlePinchEnd() {
    cursor.state = 'normal';
    if (!grabbedItem) return;

    let targetZone = zones.find(z => z.contains(cursor.x, cursor.y));
    
    if (currentState === GAME_STATES.M1 && targetZone?.id === 'nest') {
        if(grabbedItem.id === 'water') { missionData.antNeeds.water = Math.min(100, missionData.antNeeds.water + 30); addScore(25, targetZone.x, targetZone.y - 120); }
        if(grabbedItem.id === 'meat') { missionData.antNeeds.meat = Math.min(100, missionData.antNeeds.meat + 30); addScore(25, targetZone.x, targetZone.y - 120); }
        if(grabbedItem.id === 'nectar') { missionData.antNeeds.nectar = Math.min(100, missionData.antNeeds.nectar + 30); addScore(25, targetZone.x, targetZone.y - 120); }
        
        missionData.antReadiness = Math.min(100, missionData.antReadiness + 10);
        if (missionData.antReadiness >= 100) setupState(GAME_STATES.M2);

        grabbedItem.x = cw * 0.85; grabbedItem.y = grabbedItem.id === 'water' ? ch*0.3 : (grabbedItem.id === 'meat' ? ch*0.5 : ch*0.7);
        grabbedItem.relX = grabbedItem.x / cw; grabbedItem.relY = grabbedItem.y / ch;
    } 
    else if (currentState === GAME_STATES.M2) {
        if (grabbedItem.type === 'ingredient') {
            if (targetZone?.id === 'board' && !grabbedItem.isChopped) {
                grabbedItem.targetZone = targetZone; grabbedItem.x = targetZone.x; grabbedItem.y = targetZone.y;
                grabbedItem.relX = grabbedItem.x / cw; grabbedItem.relY = grabbedItem.y / ch;
            } else if (targetZone?.id === 'tray' && grabbedItem.isChopped) {
                grabbedItem.targetZone = targetZone;
                let inTrayCount = items.filter(i => i.type === 'ingredient' && i.targetZone?.id === 'tray').length;
                grabbedItem.x = targetZone.x - 140 + (inTrayCount * 55); 
                grabbedItem.y = targetZone.y; grabbedItem.relX = grabbedItem.x / cw; grabbedItem.relY = grabbedItem.y / ch;
                grabbedItem.isDraggable = false;
                addScore(50, grabbedItem.x, grabbedItem.y - 30);
                if (items.filter(i => i.type === 'ingredient' && i.targetZone?.id === 'tray').length === 6) setTimeout(() => setupState(GAME_STATES.M3), 1200);
            } else resetIngredientPos(grabbedItem);
        } else if (grabbedItem.type === 'tool') {
            grabbedItem.x = cw * 0.85; grabbedItem.y = ch / 2; grabbedItem.relX = grabbedItem.x / cw; grabbedItem.relY = grabbedItem.y / ch;
        }
    }
    else if (currentState === GAME_STATES.M3) {
        if (grabbedItem.type === 'ingredient' && targetZone?.id === 'mortar') {
            grabbedItem.targetZone = targetZone; grabbedItem.x = targetZone.x; grabbedItem.y = targetZone.y;
            grabbedItem.relX = grabbedItem.x / cw; grabbedItem.relY = grabbedItem.y / ch;
        } else if (grabbedItem.type === 'tool') {
            grabbedItem.x = cw * 0.85; grabbedItem.y = ch / 2; grabbedItem.relX = grabbedItem.x / cw; grabbedItem.relY = grabbedItem.y / ch;
        } else resetIngredientPos(grabbedItem);
    }
    else if (currentState === GAME_STATES.M4 || currentState === GAME_STATES.M6) {
        if (grabbedItem.type === 'ingredient' && targetZone?.id === 'bowl') {
            items = items.filter(i => i.id !== grabbedItem.id);
            missionData.bowlContents.push(grabbedItem.id); 
            addScore(20, targetZone.x, targetZone.y - 120);
            if(items.length === 0) setupState(currentState === GAME_STATES.M4 ? GAME_STATES.M5 : GAME_STATES.M7);
        } else resetIngredientPos(grabbedItem);
    }
    else if (currentState === GAME_STATES.M5 || currentState === GAME_STATES.M7) {
        if (grabbedItem.type === 'tool') { grabbedItem.x = cw * 0.85; grabbedItem.y = ch / 2; grabbedItem.relX = grabbedItem.x / cw; grabbedItem.relY = grabbedItem.y / ch; }
    }
    actionTarget = null; actionTimer = 0; grabbedItem = null;
}

function drawLoop() {
    cursor.x += (rawCursor.x - cursor.x) * 0.3; cursor.y += (rawCursor.y - cursor.y) * 0.3;
    ctx.clearRect(0, 0, cw, ch);
    updateGameLogic();
    zones.forEach(z => z.draw(ctx));
    items.forEach(i => i.draw(ctx));
    drawMissionUI();
    if (handDetected && landmarks) drawHandSkeleton();
    drawFloatingScores();
    drawCursor();
    requestAnimationFrame(drawLoop);
}

function updateGameLogic() {
    if (!cursor.isPinching) {
        let hovering = items.some(i => i.isDraggable && i.contains(cursor.x, cursor.y)) ||
                       (currentState === GAME_STATES.INSTRUCT && items.some(i => i.id === 'startBtn' && i.contains(cursor.x, cursor.y))) ||
                       ((currentState === GAME_STATES.END || currentState === GAME_STATES.FAIL) && items.some(i => i.id === 'restartBtn' && i.contains(cursor.x, cursor.y)));
        cursor.state = hovering ? 'hover' : 'normal';
    }
    if (grabbedItem) { grabbedItem.x = cursor.x; grabbedItem.y = cursor.y; }

    if (currentState === GAME_STATES.M1) {
        // ลดความเร็วมดหิวลง
        missionData.antNeeds.water -= 0.02; missionData.antNeeds.meat -= 0.02; missionData.antNeeds.nectar -= 0.02;
        if(missionData.antNeeds.water <= 0 || missionData.antNeeds.meat <= 0 || missionData.antNeeds.nectar <= 0) setupState(GAME_STATES.FAIL);
    }

    if (currentState === GAME_STATES.M2 && grabbedItem?.type === 'tool') {
        let targetZone = zones[0];
        if (targetZone.contains(cursor.x, cursor.y)) {
            let targetIng = items.find(i => i.type === 'ingredient' && i.targetZone === targetZone && !i.isChopped);
            if (targetIng) {
                actionTarget = targetIng; actionTimer++;
                if (actionTimer > 120) {
                    targetIng.isChopped = true; targetIng.name += ' (ซอยแล้ว)';
                    actionTimer = 0; actionTarget = null;
                    addScore(30, targetIng.x, targetIng.y - 45);
                }
            }
        } else { actionTimer = 0; actionTarget = null; }
    }

    // ระบบขยับสากขึ้น-ลง ตำครก
    if (currentState === GAME_STATES.M3 && grabbedItem?.id === 'pestle') {
        let mortar = zones[0];
        let targetIng = items.find(i => i.type === 'ingredient' && i.targetZone === mortar);
        
        if (mortar.contains(cursor.x, cursor.y) && targetIng) {
            let currentY = cursor.y;
            let dy = currentY - missionData.lastPestleY;
            
            if (Math.abs(dy) > 10) {
                if (dy > 0 && missionData.poundDirection <= 0) { 
                    missionData.poundDirection = 1;
                    missionData.poundCount++;
                    addScore(5, mortar.x, mortar.y - 50);
                } else if (dy < 0 && missionData.poundDirection >= 0) { 
                    missionData.poundDirection = -1;
                }
                missionData.lastPestleY = currentY;
            }

            if (missionData.poundCount >= 10) { 
                targetIng.isChopped = true; targetIng.name += ' (ป่นแล้ว)';
                targetIng.targetZone = null; targetIng.x = cw * 0.15; targetIng.y = ch / 2;
                targetIng.relX = targetIng.x / cw; targetIng.relY = targetIng.y / ch;
                addScore(50, targetIng.x, targetIng.y);
                grabbedItem.x = cw * 0.85; grabbedItem.y = ch / 2; cursor.isPinching = false; grabbedItem = null;
                setTimeout(() => setupState(GAME_STATES.M4), 500);
            }
        } else {
            missionData.lastPestleY = cursor.y;
        }
    }

    if ((currentState === GAME_STATES.M5 || currentState === GAME_STATES.M7) && grabbedItem?.id === 'spoon') {
        let bowl = zones[0];
        if (bowl.contains(cursor.x, cursor.y)) {
            let dx = cursor.x - lastStirPos.x; let dy = cursor.y - lastStirPos.y; let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 5 && dist < 100) stirProgress += dist;
            if (stirProgress > 3000) {
                let stirReward = currentState === GAME_STATES.M5 ? 100 : 150;
                addScore(stirReward, bowl.x, bowl.y - 120);
                setupState(currentState === GAME_STATES.M5 ? GAME_STATES.M6 : GAME_STATES.END);
            }
        }
        lastStirPos = {x: cursor.x, y: cursor.y};
    } else { lastStirPos = {x: cursor.x, y: cursor.y}; }
}

function drawFloatingScores() {
    for (let i = scorePops.length - 1; i >= 0; i--) {
        let pop = scorePops[i];
        ctx.save(); ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = `rgba(254, 240, 138, ${pop.alpha})`; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 6; ctx.font = `bold 24px 'Sarabun', 'Thonburi', sans-serif`; ctx.fillText(pop.text, pop.x, pop.y); ctx.restore();
        pop.y -= 1.2; pop.alpha -= 0.016; pop.life--;
        if (pop.life <= 0 || pop.alpha <= 0) scorePops.splice(i, 1);
    }
}

function drawMissionUI() {
    ctx.save(); ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.direction = 'ltr';
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.roundRect(25, 25, 210, 50, 15); ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.font = "bold 18px 'Sarabun', 'Thonburi', sans-serif"; ctx.fillStyle = '#fef08a'; ctx.textAlign = 'left'; ctx.fillText(`🏆 คะแนนสะสม: ${score}`, 45, 50 + (isIOSDevice ? 3 : 0));
    ctx.textAlign = 'center'; let barWidth = Math.min(300, cw * 0.8);
    
    if (currentState === GAME_STATES.M1) {
        let iosYOffset = isIOSDevice ? 2 : 0;
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(cw/2 - barWidth/2, ch*0.18, barWidth, 20); ctx.fillStyle = '#60a5fa'; ctx.fillRect(cw/2 - barWidth/2, ch*0.18, barWidth * (Math.max(0,missionData.antNeeds.water)/100), 20); ctx.fillStyle = 'white'; ctx.font = "bold 14px 'Sarabun', 'Thonburi', -apple-system, sans-serif"; ctx.fillText('น้ำ', cw/2, ch*0.18 + 10 + iosYOffset);
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(cw/2 - barWidth/2, ch*0.18 + 30, barWidth, 20); ctx.fillStyle = '#f87171'; ctx.fillRect(cw/2 - barWidth/2, ch*0.18 + 30, barWidth * (Math.max(0,missionData.antNeeds.meat)/100), 20); ctx.fillStyle = 'white'; ctx.fillText('เนื้อ', cw/2, ch*0.18 + 40 + iosYOffset);
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(cw/2 - barWidth/2, ch*0.18 + 60, barWidth, 20); ctx.fillStyle = '#fbbf24'; ctx.fillRect(cw/2 - barWidth/2, ch*0.18 + 60, barWidth * (Math.max(0,missionData.antNeeds.nectar)/100), 20); ctx.fillStyle = 'white'; ctx.fillText('น้ำหวาน', cw/2, ch*0.18 + 70 + iosYOffset);
        let readyWidth = Math.min(400, cw * 0.85); ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(cw/2 - readyWidth/2, ch*0.8, readyWidth, 30); ctx.fillStyle = '#4ade80'; ctx.fillRect(cw/2 - readyWidth/2, ch*0.8, readyWidth * (missionData.antReadiness/100), 30); ctx.fillStyle = 'white'; ctx.fillText('ความพร้อมเก็บไข่มดแดง', cw/2, ch*0.8 + 15);
    }
    
    if (currentState === GAME_STATES.M5 || currentState === GAME_STATES.M7) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(cw/2 - barWidth/2, ch*0.8, barWidth, 30); ctx.fillStyle = '#a78bfa'; ctx.fillRect(cw/2 - barWidth/2, ch*0.8, barWidth * Math.min(1, stirProgress/3000), 30); ctx.fillStyle = 'white'; ctx.font = "bold 14px 'Sarabun', 'Thonburi', sans-serif"; ctx.fillText('กำลังคลุกเคล้าส่วนผสม...', cw/2, ch*0.8 + 15);
    }
    ctx.restore();
}

function drawHandSkeleton() {
    ctx.save(); ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.fillStyle = 'rgba(0, 255, 255, 0.8)';
    HAND_CONNECTIONS.forEach(([a, b]) => { ctx.beginPath(); ctx.moveTo((1 - landmarks[a].x) * cw, landmarks[a].y * ch); ctx.lineTo((1 - landmarks[b].x) * cw, landmarks[b].y * ch); ctx.stroke(); });
    landmarks.forEach(lm => { ctx.beginPath(); ctx.arc((1 - lm.x) * cw, lm.y * ch, 4, 0, 2 * Math.PI); ctx.fill(); }); ctx.restore();
}

function drawCursor() {
    ctx.save(); ctx.beginPath(); ctx.arc(cursor.x, cursor.y, 20, 0, Math.PI * 2); ctx.lineWidth = 4;
    if (cursor.state === 'normal') ctx.strokeStyle = '#3b82f6';
    else if (cursor.state === 'hover') { ctx.strokeStyle = '#facc15'; ctx.setLineDash([5, 5]); }
    else if (cursor.state === 'missed') ctx.strokeStyle = '#ef4444';
    else if (cursor.state === 'grabbed') { ctx.strokeStyle = '#22c55e'; ctx.fillStyle = '#22c55e'; ctx.fill(); ctx.fillStyle = 'white'; ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('✔️', cursor.x, cursor.y); }
    if(cursor.state !== 'grabbed') ctx.stroke(); ctx.restore();
}

btnInit.addEventListener('click', () => {
    screenStart.style.opacity = '0';
    setTimeout(() => { screenStart.classList.add('hidden'); initMediaPipe(); setupState(GAME_STATES.INSTRUCT); resize(); requestAnimationFrame(drawLoop); }, 500);
});
</script>
