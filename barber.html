<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Millions Black Barber Shop</title>
    <link rel="stylesheet" href="barber.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

            <!-- Topbar  -->

    <header>
        <div class="topbar">
            <div class="home-icon">
                <a href="#">
                    <i class="fa-solid fa-house"></i>
                </a>
            </div>
            <div class="menu-bar">
                <i class="fa-solid fa-bars"></i>
                <div class="menu-bar-sub">
                    <a href="#">Short Hairs</a>
                    <a href="#">Long Hairs</a>
                    <a href="#">Fade Style</a>
                </div>
            </div>
        </div>
    </header>

          <!-- container -->

    <div class="container">
        <div class="home-text">
            <div class="brand-text">
                <h1>Millions&nbsp; black</h1>
                <h2>Barber&nbsp; Shop</h2>
            </div>
            <div class="open-time">
                <h2>เปิดให้บริการทุกวัน</h2>
                <h3>10:00น. - 20:00น.</h3>
            </div>
        </div>
        <div class="choice-select">
            <div class="content">
                <div class="long-hair">
                    <a href="#">Long Hairstyle</a>
                </div>
                <div class="short-hair">
                    <a href="#">Short Hairstyle</a>
                </div>
                <div class="fade-hair">
                    <a href="#">Fade Hairstyle</a>
                </div>
            </div>
        </div>
    </div>
    

         <!-- footer -->
    
    <footer>
        <div class="footer-text">
            <div class="address">
                <h3>address / ที่อยู่</h3>
                <p>xxx หมู่x บ.ทู้ ต.น้ำก่ำ อ.ธาตุพนม จ.นครพนม</p>
            </div>
            <div class="contact">
                <h4>เบอร์โทร : 06x-xxx-xxx</h4>
            </div>
            <div class="contact-logo">
                <a href="#">
                    <img src="Facebook.png" alt="">
                </a>
                <a href="#">
                    <img src="Instagram.png" alt="">
                </a>
                <a href="#">
                    <img src="LINE.png" alt="">
                </a>
            </div>
        </div>
    </footer>
    
</body>
</html>
